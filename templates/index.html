<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Monitor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
margin-bottom:10px;
}

.subtitle{
opacity:.8;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.label{
opacity:.8;
margin-bottom:10px;
}

.value{
font-size:1.8rem;
font-weight:bold;
margin-bottom:10px;
}

.bar{
height:12px;
background:#334155;
border-radius:6px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#22c55e;
transition:.5s;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;
}

canvas{
margin-top:20px;
background:#1e293b;
padding:10px;
border-radius:10px;
}

.alert-box{
padding:16px 20px;
border-radius:12px;
font-weight:bold;
margin-bottom:25px;
background:#1e293b;
border-left:6px solid #22c55e;
}

.alert-ok{
border-left-color:#22c55e;
}

.alert-warn{
border-left-color:#f59e0b;
}

.alert-danger{
border-left-color:#ef4444;
}
</style>
</head>

<body>

<div class="container">

<h1>Server Monitor Dashboard</h1>
<div class="subtitle">Monitoreo del sistema en tiempo real</div>

<div id="alert-box" class="alert-box alert-ok">Sistema estable</div>

<button onclick="loadMetrics()">Actualizar</button>

<div class="grid">

<div class="card">
<div class="label">Equipo</div>
<div id="hostname" class="value">Cargando...</div>
</div>

<div class="card">
<div class="label">Estado</div>
<div id="status" class="value">Cargando...</div>
</div>

<div class="card">
<div class="label">Uptime</div>
<div id="uptime" class="value">Cargando...</div>
</div>

<div class="card">
<div class="label">CPU</div>
<div id="cpu" class="value">0%</div>
<div class="bar"><div id="cpu-bar" class="fill"></div></div>
</div>

<div class="card">
<div class="label">RAM</div>
<div id="ram" class="value">0%</div>
<div class="bar"><div id="ram-bar" class="fill"></div></div>
</div>

<div class="card">
<div class="label">Disco</div>
<div id="disk" class="value">0%</div>
<div class="bar"><div id="disk-bar" class="fill"></div></div>
</div>

</div>

<h2>Historial de uso</h2>

<canvas id="cpuChart"></canvas>
<canvas id="ramChart"></canvas>
<canvas id="diskChart"></canvas>

</div>

<script>

function getBarColor(value){
if(value<50)return"#22c55e"
if(value<80)return"#f59e0b"
return"#ef4444"
}

function updateMetric(idText,idBar,value){
const rounded=Number(value).toFixed(1)
document.getElementById(idText).textContent=`${rounded}%`
const bar=document.getElementById(idBar)
bar.style.width=value+"%"
bar.style.background=getBarColor(value)
}

function updateAlert(cpu,ram,disk){
const alertBox=document.getElementById("alert-box")

alertBox.className="alert-box"

if(cpu>=80 || ram>=85 || disk>=90){
alertBox.textContent="Alerta crítica: uso alto detectado"
alertBox.classList.add("alert-danger")
}else if(cpu>=60 || ram>=70 || disk>=80){
alertBox.textContent="Advertencia: uso moderado/alto"
alertBox.classList.add("alert-warn")
}else{
alertBox.textContent="Sistema estable"
alertBox.classList.add("alert-ok")
}
}

const cpuData=[]
const ramData=[]
const diskData=[]
const labels=[]

const cpuChart=new Chart(document.getElementById("cpuChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"CPU %",
data:cpuData,
borderColor:"#22c55e",
tension:.3
}]
}
})

const ramChart=new Chart(document.getElementById("ramChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"RAM %",
data:ramData,
borderColor:"#3b82f6",
tension:.3
}]
}
})

const diskChart=new Chart(document.getElementById("diskChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Disk %",
data:diskData,
borderColor:"#f59e0b",
tension:.3
}]
}
})

async function loadMetrics(){
const response=await fetch("/metrics")
const data=await response.json()

document.getElementById("hostname").textContent=data.hostname
document.getElementById("status").textContent=data.status
document.getElementById("uptime").textContent=data.uptime

updateMetric("cpu","cpu-bar",data.cpu)
updateMetric("ram","ram-bar",data.ram)
updateMetric("disk","disk-bar",data.disk)

updateAlert(data.cpu,data.ram,data.disk)

const time=new Date().toLocaleTimeString()

labels.push(time)
cpuData.push(data.cpu)
ramData.push(data.ram)
diskData.push(data.disk)

if(labels.length>20){
labels.shift()
cpuData.shift()
ramData.shift()
diskData.shift()
}

cpuChart.update()
ramChart.update()
diskChart.update()
}

loadMetrics()
setInterval(loadMetrics,3000)

</script>

</body>
</html>
